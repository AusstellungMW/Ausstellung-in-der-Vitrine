<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ausstellung in der Vitrine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #player {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2rem;
      text-align: center;
      cursor: pointer;
      z-index: 10;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div id="overlay">Zum Start tippen</div>

  <video id="player" loop playsinline preload="auto">
    <source src="result_video_fast.mp4" type="video/mp4">
    Ihr Browser unterstützt dieses Video nicht.
  </video>

  <script>
    const video = document.getElementById("player");
    const overlay = document.getElementById("overlay");

    overlay.addEventListener("click", async () => {
      try {
        video.muted = false;
        video.volume = 1.0;
        await video.play();
        overlay.style.display = "none";
      } catch (err) {
        console.error("Start fehlgeschlagen:", err);
      }
    });
  </script>

</body>
</html>
